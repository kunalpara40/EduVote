{% extends 'base.html' %}
{% block title %}Login — EduVote{% endblock %}
{% block content %}
<div class="auth-wrap">
  <h1>Voter Login</h1>
  <p>Enter your student ID and password to access the voting portal.</p>
  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Student ID</label>
        <input name="student_id" type="text" placeholder="e.g. CS2021001" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input name="password" type="password" placeholder="Your password" required/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:0.75rem;">Login</button>
    </form>
  </div>
  <p class="auth-footer">New voter? <a href="{{ url_for('voter.register') }}">Register here</a></p>
  <p class="auth-footer" style="margin-top:0.5rem;">
    <a href="{{ url_for('admin.admin_login') }}" style="color:var(--muted);font-size:0.8rem;">Admin Login</a>
  </p>
</div>
{% endblock %}
