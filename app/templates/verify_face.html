{% extends 'base.html' %}

{% block title %}Verify Face - EduVote{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4 text-center">Verify Your Identity</h2>
        <div class="card shadow-sm p-4">
            <p class="text-muted mb-4 text-center">
                To cast your vote, please verify your identity by capturing a live photo of your face.
            </p>

            <form method="POST" action="{{ url_for('voter.verify_face') }}">
                <div class="form-group face-capture-section">
                    <div class="video-container mb-3" style="border: 2px solid #ddd; border-radius: 8px; overflow: hidden;">
                        <video id="video" width="50%" height="200px" autoplay playsinline></video>
                        <canvas id="canvas" style="display:none;"></canvas>
                    </div>
                    
                    <div class="text-center">
                        <button type="button" id="capture-btn" class="btn btn-secondary mb-3">
                            <i class="fas fa-camera"></i> Capture Face
                        </button>
                        
                        <div id="capture-status" style="color: #28a745; display: none; margin-bottom: 15px;">
                            <i class="fas fa-check-circle"></i> Face captured successfully!
                        </div>
                    </div>

                    <input type="hidden" id="face_image" name="face_image" required>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-block" id="submit-btn" disabled>
                        Verify & Vote
                    </button>
                    <a href="{{ url_for('voter.dashboard') }}" class="btn btn-light btn-block">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const captureBtn = document.getElementById('capture-btn');
    const faceImageInput = document.getElementById('face_image');
    const submitBtn = document.getElementById('submit-btn');
    const captureStatus = document.getElementById('capture-status');

    // Access webcam
    navigator.mediaDevices.getUserMedia({ video: true })
        .then(stream => {
            video.srcObject = stream;
        })
        .catch(err => {
            console.error("Error accessing webcam: ", err);
            alert("Could not access webcam. Face verification requires a webcam.");
        });

    captureBtn.addEventListener('click', () => {
        const context = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        context.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // Get base64 string
        const imageData = canvas.toDataURL('image/jpeg');
        faceImageInput.value = imageData;
        
        // Update UI
        captureStatus.style.display = 'block';
        submitBtn.disabled = false;
        
        // Optional: Provide visual feedback on the video element
        video.style.opacity = "0.5";
        setTimeout(() => video.style.opacity = "1", 200);
    });
</script>
{% endblock %}
