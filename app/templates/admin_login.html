{% extends 'base.html' %}
{% block title %}Admin Login — EduVote{% endblock %}

{% block content %}
<div class="auth-wrap">
  <h1>Admin Login</h1>
  <p>Restricted access — authorized personnel only.</p>
  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input name="username" type="text" placeholder="admin" required autofocus />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input name="password" type="password" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:0.75rem;">Access Admin Panel</button>
    </form>
  </div>
  <p class="auth-footer" style="margin-top:1rem;">Default: admin / admin123</p>
</div>
{% endblock %}
