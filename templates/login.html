{% extends 'base.html' %}
{% block title %}Login — EduVote{% endblock %}
{% block extra_css %}
<style>
.auth-wrap { max-width: 420px; margin: 3rem auto; }
.auth-wrap h1 { font-size: 1.8rem; margin-bottom: 0.3rem; }
.auth-wrap p { color: var(--muted); margin-bottom: 2rem; font-size: 0.95rem; }
.auth-footer { text-align: center; margin-top: 1.2rem; font-size: 0.9rem; color: var(--muted); }
.auth-footer a { color: var(--accent); text-decoration: none; }
</style>
{% endblock %}
{% block content %}
<div class="auth-wrap">
  <h1>Voter Login</h1>
  <p>Enter your student ID and password to access the voting portal.</p>
  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Student ID</label>
        <input name="student_id" type="text" placeholder="e.g. CS2021001" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input name="password" type="password" placeholder="Your password" required/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:0.75rem;">Login</button>
    </form>
  </div>
  <p class="auth-footer">New voter? <a href="{{ url_for('register') }}">Register here</a></p>
  <p class="auth-footer" style="margin-top:0.5rem;">
    <a href="{{ url_for('admin_login') }}" style="color:var(--muted);font-size:0.8rem;">Admin Login</a>
  </p>
</div>
{% endblock %}
